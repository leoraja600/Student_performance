version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: spa_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-student_performance_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spa_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-student_performance_db}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-min-32-chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 5000
      NODE_ENV: production
      FRONTEND_URL: http://localhost:80
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@college.edu}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123456}
      ADMIN_NAME: ${ADMIN_NAME:-System Admin}
      LEETCODE_MAX_SCORE: ${LEETCODE_MAX_SCORE:-300}
      LEETCODE_WEIGHT: ${LEETCODE_WEIGHT:-50}
      HACKERRANK_MAX_SCORE: ${HACKERRANK_MAX_SCORE:-500}
      HACKERRANK_WEIGHT: ${HACKERRANK_WEIGHT:-50}
      LC_REQUEST_DELAY: ${LC_REQUEST_DELAY:-1500}
      HR_CACHE_TTL_MINUTES: ${HR_CACHE_TTL_MINUTES:-60}
      CRON_SCHEDULE: ${CRON_SCHEDULE:-0 */6 * * *}
      CRON_ENABLED: ${CRON_ENABLED:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: spa_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
